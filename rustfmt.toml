# Merge imports from the same module
imports_granularity = "Module"   # even more aggressive merging
# Reorder imports alphabetically
reorder_imports = true

# Reorder items within import braces
reorder_imported_names = true

# Normalize grouping (std, external, crate)
group_imports = "One"            # everything in one block

# Remove redundant `self` imports where possible
imports_layout = "HorizontalVertical"
