[package]
name = "eth-prices"
version = "0.0.1"
edition = "2024"
description = "A library for fetching Ethereum prices."
license = "LGPL-3.0"
repository = "https://github.com/v3xlabs/eth-prices"

[dependencies]
alloy = { version = "1", features = [
    "contract",
    "provider-http",
    "reqwest-rustls-tls",
], default-features = false }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
futures = "0"
async-stream = "0.3.6"
figment = { version = "0.10.19", features = ["toml"] }
petgraph = "0.8.3"
tracing = { version = "0.1.44", default-features = false, features = ["log"] }
tracing-subscriber = "0.3.23"
