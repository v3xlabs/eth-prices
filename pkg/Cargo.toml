[package]
name = "eth-prices"
version = "0.0.1"
edition = "2024"
description = "A library for fetching Ethereum prices."
license = "LGPL-3.0"

[dependencies]
alloy = { version = "1", features = [
    "contract",
    "provider-http",
    "reqwest-rustls-tls",
], default-features = false }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
futures = "0"
async-stream = "0.3.6"
figment = { version = "0.10.19", features = ["toml"] }
